<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">

    <!-- Fontes -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Cormorant+Garamond:ital,wght@1,700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Ícones -->
    <link rel="icon" href="icons/favicon.ico">
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <title>Bíblia Sagrada</title>
</head>

<body>

    <div class="container">

        <div class="conteudo-principal">
            
            <div class="titulos-container">
                <h1>BÍBLIA</h1>
                <h2>SAGRADA</h2>
            </div>

            <div id="referencia"></div>

            <div class="versiculo-container">
                <div id="versiculo"></div>
            </div>

            <div class="botoes-container">
                <button id="botao-som" title="Ativar/Desativar som">
                    <i class="fas fa-volume-up"></i>
                </button>

                <button id="botao">
                    <img src="orar_botao.png" alt="Orar">
                </button>

                <a href="https://pagamentobiblia.vercel.app/" target="_blank" class="botao-ajude" id="botao-ajude" title="Ajude-nos">
                    <i class="fas fa-heart"></i>
                    <span>Ajude-nos!</span>
                </a>
            </div>

        <div class="rodape">
            <div class="dica-print">
                Tire um print para compartilhar
            </div>
        </div>

    </div>

    <div id="loading">CARREGANDO...</div>

    <script src="app.js"></script>

    <!-- Service Worker -->
    <script>
    if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("sw.js");
    }
    </script>

</body>
</html>
